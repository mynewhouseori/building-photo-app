<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>מערך צילום לבניין</title>
  <script src="./firebase-config.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: #101827;
      background: url("mobile-background01-logo-centered-small-up.png") center top / cover no-repeat;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      width: min(100%, 480px);
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-x: hidden;
    }

    .rights {
      margin: 2px 0 0;
      color: rgba(255, 255, 255, .82);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .42);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      min-width: 0;
    }

    .lang-picker {
      display: inline-flex;
      gap: 6px;
      padding: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .16);
      border: 1px solid rgba(255, 255, 255, .26);
      box-shadow: 0 10px 22px rgba(0, 0, 0, .18);
      backdrop-filter: blur(4px);
      flex: 0 0 auto;
    }

    .lang-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255, 255, 255, .38);
      border-radius: 999px;
      display: grid;
      place-items: center;
      padding: 0;
      background: rgba(255, 255, 255, .1);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .22);
    }

    .lang-btn.active {
      background: #ffffff;
      box-shadow: 0 8px 16px rgba(0, 0, 0, .18);
    }

    h1 {
      margin: 0;
      color: #ffffff;
      font-size: 26px;
      line-height: 1.2;
      text-shadow: 0 2px 12px rgba(0, 0, 0, .45);
      min-width: 0;
      flex: 1 1 auto;
      text-align: end;
      overflow-wrap: break-word;
    }

    .panel {
      width: 100%;
      min-width: 0;
      margin-top: auto;
      border-radius: 16px;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    .fields {
      display: grid;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    label {
      display: grid;
      gap: 5px;
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .45);
      min-width: 0;
      text-align: center;
    }

    input,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, .62);
      border-radius: 10px;
      background: transparent;
      color: #ffffff;
      padding: 10px 11px;
      outline: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .16);
      min-width: 0;
      text-align: center;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, .72);
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, .18);
    }

    .checks {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 54px;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      width: 100%;
      min-width: 0;
    }

    .check {
      position: relative;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 7px 6px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #ffffff;
      box-shadow: none;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .check input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      margin: 0;
      padding: 0;
      border: 0;
      opacity: 0;
      cursor: pointer;
    }

    .check-box {
      width: 23px;
      height: 23px;
      border: 2px solid rgba(255, 255, 255, .9);
      border-radius: 7px;
      background: rgba(2, 6, 23, .14);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .24), inset 0 1px 0 rgba(255, 255, 255, .22);
    }

    .check input:checked + .check-box {
      background: #f97316;
      border-color: #ffffff;
    }

    .check input:checked + .check-box::after {
      content: "";
      width: 6px;
      height: 11px;
      border: solid #ffffff;
      border-width: 0 3px 3px 0;
      transform: rotate(45deg) translateY(-1px);
    }

    .check input:disabled + .check-box {
      opacity: .45;
    }

    .check-text {
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.15;
    }

    .camera-icon-btn {
      min-height: 44px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: none;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .45);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .camera-icon {
      font-size: 35px;
      line-height: 1;
    }

    .camera {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    .preview {
      width: 100%;
      aspect-ratio: 4 / 3;
      border: 1px dashed rgba(249, 115, 22, .65);
      border-radius: 12px;
      background: rgba(255, 255, 255, .16);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: rgba(255, 255, 255, .82);
      text-align: center;
      padding: 12px;
    }

    .preview.final-preview {
      aspect-ratio: 7 / 9;
      padding: 0;
      background: rgba(255, 255, 255, .08);
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .22), 0 18px 34px rgba(0, 0, 0, .24);
    }

    .preview img,
    .preview video,
    .preview canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .preview img,
    .preview video {
      object-fit: cover;
    }

    .preview canvas {
      object-fit: contain;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .btn,
    .download,
    .clear-btn {
      min-height: 48px;
      border-radius: 11px;
      border: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px 12px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 14px 24px rgba(0, 0, 0, .28), inset 0 1px 0 rgba(255, 255, 255, .22);
      transition: transform .14s ease, box-shadow .18s ease, filter .18s ease;
    }

    .btn:hover,
    .download:hover,
    .clear-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(0, 0, 0, .34), inset 0 1px 0 rgba(255, 255, 255, .3);
      filter: brightness(1.04);
    }

    .btn:active,
    .download:active,
    .clear-btn:active {
      transform: translateY(1px) scale(.99);
      box-shadow: 0 8px 16px rgba(0, 0, 0, .24), inset 0 1px 0 rgba(255, 255, 255, .14);
    }

    .btn {
      background: linear-gradient(180deg, #fb923c 0%, #ea580c 100%);
      color: #ffffff;
      cursor: pointer;
    }

    .btn.done {
      background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
    }

    .download {
      background: linear-gradient(180deg, #1f2937 0%, #020617 100%);
      color: #ffffff;
    }

    .download.saved {
      background: linear-gradient(180deg, #22c55e 0%, #15803d 100%);
    }

    .clear-btn {
      width: 100%;
      margin-top: 9px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .95) 0%, rgba(226, 232, 240, .95) 100%);
      color: #111827;
      cursor: pointer;
    }

    .clear-btn[hidden] {
      display: none;
    }

    .btn:disabled,
    .download[aria-disabled="true"] {
      opacity: .5;
      pointer-events: none;
    }

    .status {
      min-height: 20px;
      color: rgba(255, 255, 255, .92);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .45);
    }

    .trial-notice {
      min-height: 20px;
      color: rgba(255, 255, 255, .9);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .45);
    }

    .trial-notice.expired {
      color: #fee2e2;
    }

    .access-panel {
      display: none;
      gap: 9px;
      margin-bottom: 10px;
    }

    .access-panel.visible {
      display: grid;
    }

    .access-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
    }

    .access-note {
      min-height: 20px;
      color: rgba(255, 255, 255, .9);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .45);
    }

    @media (max-width: 380px) {
      .access-grid,
      .actions {
        grid-template-columns: 1fr;
      }

      .app {
        padding-left: 12px;
        padding-right: 12px;
        gap: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .checks {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 48px;
        gap: 5px;
      }

      .check {
        font-size: 13px;
        padding-inline: 3px;
      }

      .check-box {
        width: 21px;
        height: 21px;
      }

      .camera-icon {
        font-size: 31px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1 data-i18n="title">מערך צילום לבניין</h1>
      <div class="lang-picker" aria-label="בחירת שפה">
        <button class="lang-btn active" type="button" data-lang="he" aria-label="עברית">🇮🇱</button>
        <button class="lang-btn" type="button" data-lang="en" aria-label="English">🇺🇸</button>
      </div>
    </div>

    <section class="panel">
      <div id="accessPanel" class="access-panel">
        <div class="access-grid">
          <label>
            <span data-i18n="emailLabel">אימייל</span>
            <input id="accessEmail" type="text" inputmode="email" autocomplete="email" data-i18n-placeholder="emailPlaceholder" placeholder="אימייל">
          </label>
        </div>
        <button id="accessLoginBtn" class="clear-btn" type="button" data-i18n="loginBtn">כניסה לגרסת ניסיון</button>
        <div id="accessNote" class="access-note"></div>
      </div>

      <div class="fields">
        <label>
          <span data-i18n="siteLabel">אתר</span>
          <input id="site" data-i18n-placeholder="sitePlaceholder" placeholder="שם האתר או כתובת הבניין">
        </label>
        <label>
          <span data-i18n="photographerLabel">צלם</span>
          <input id="photographer" data-i18n-placeholder="photographerPlaceholder" placeholder="שם הצלם">
        </label>
        <label>
          <span data-i18n="notesLabel">הערות</span>
          <textarea id="notes" data-i18n-placeholder="notesPlaceholder" placeholder="הערות שיופיעו על התמונה"></textarea>
        </label>
      </div>

      <div class="checks">
        <label class="check"><input id="dateTimeCheck" type="checkbox"><span class="check-box" aria-hidden="true"></span><span class="check-text" data-i18n="dateTimeLabel">תאריך ושעה</span></label>
        <label class="check"><input id="locationCheck" type="checkbox"><span class="check-box" aria-hidden="true"></span><span class="check-text" data-i18n="locationLabel">מיקום</span></label>
        <button id="cameraBtn" class="camera-icon-btn" type="button" data-i18n-aria-label="cameraAria" aria-label="צילום">
          <span class="camera-icon" aria-hidden="true">📷</span>
        </button>
      </div>

      <div class="camera">
        <div id="preview" class="preview" data-i18n="previewEmpty">כאן תופיע התמונה</div>
        <button id="captureBtn" class="clear-btn" type="button" data-i18n="captureBtn" hidden>צלם</button>
        <div class="actions">
          <button id="createBtn" class="btn" type="button" data-i18n="createBtn" disabled>צור תמונה</button>
          <a id="downloadLink" class="download" href="#" download="building-photo-report.png" aria-disabled="true" data-i18n="saveBtn">שמירה</a>
        </div>
        <button id="clearBtn" class="clear-btn" type="button" data-i18n="clearBtn" hidden>נקה מסך</button>
        <div id="trialNotice" class="trial-notice" aria-live="polite"></div>
        <div id="status" class="status" aria-live="polite"></div>
      </div>
    </section>
    <footer class="rights" data-i18n="rights">כל הזכויות שמורות</footer>
  </main>

  <script>
    const cameraBtn = document.getElementById("cameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const locationCheck = document.getElementById("locationCheck");
    const dateTimeCheck = document.getElementById("dateTimeCheck");
    const accessPanel = document.getElementById("accessPanel");
    const accessEmail = document.getElementById("accessEmail");
    const accessLoginBtn = document.getElementById("accessLoginBtn");
    const accessNote = document.getElementById("accessNote");
    const preview = document.getElementById("preview");
    const createBtn = document.getElementById("createBtn");
    const downloadLink = document.getElementById("downloadLink");
    const clearBtn = document.getElementById("clearBtn");
    const trialNotice = document.getElementById("trialNotice");
    const statusEl = document.getElementById("status");
    let selectedImage = null;
    let cameraStream = null;
    let liveVideo = null;
    let currentLang = "he";
    let currentAddress = "";
    let trialState = null;
    let firebaseMode = false;
    let firebaseServices = null;
    let currentUserEmail = "";
    let firebaseTrialLoadedUser = "";
    const watermarkLogo = new Image();
    watermarkLogo.src = "watermark-logo-transparent.png";

    const translations = {
      he: {
        dir: "rtl",
        lang: "he",
        title: "מערך צילום לבניין",
        siteLabel: "אתר",
        sitePlaceholder: "שם האתר",
        photographerLabel: "צלם",
        photographerPlaceholder: "שם הצלם",
        notesLabel: "הערות",
        notesPlaceholder: "הערות לתמונה",
        dateTimeLabel: "תאריך ושעה",
        locationLabel: "מיקום",
        emailLabel: "אימייל",
        emailPlaceholder: "אימייל",
        loginBtn: "אישור אימייל",
        cameraAria: "צילום",
        previewEmpty: "כאן תופיע התמונה",
        captureBtn: "צלם",
        createBtn: "צור תמונה",
        createdBtn: "התמונה נוצרה",
        saveBtn: "שמירה",
        savedBtn: "נשמר",
        clearBtn: "נקה מסך",
        rights: "כל הזכויות שמורות",
        needPhoto: "צריך לצלם קודם.",
        saveStarted: "השמירה התחילה",
        screenCleared: "המסך נוקה",
        cameraUnsupported: "המצלמה לא נתמכת בדפדפן הזה.",
        openingCamera: "פותח מצלמה...",
        cameraReady: "המצלמה פתוחה. לחץ צלם.",
        cameraDenied: "לא ניתן לפתוח מצלמה. צריך לאשר הרשאת מצלמה בדפדפן.",
        cameraLoading: "המצלמה עדיין נטענת. נסה שוב בעוד רגע.",
        photoCaptured: "התמונה צולמה. אפשר ליצור תמונה עם הפרטים.",
        dateTimeLine: "תאריך ושעה",
        locationLine: "מיקום",
        locationUnsupported: "GPS לא נתמך בדפדפן הזה.",
        locationLoading: "מאתר כתובת לפי מיקום...",
        locationReady: "המיקום נקלט ככתובת.",
        locationDenied: "לא התקבל אישור מיקום. צריך לאשר GPS בדפדפן.",
        addressUnavailable: "לא נמצאה כתובת מלאה למיקום הזה.",
        trialActive: "גרסת ניסיון: נותרו {days} ימים. שימוש עד {date}.",
        trialLastDay: "גרסת ניסיון: היום האחרון לשימוש. שימוש עד {date}.",
        trialExpired: "תקופת הניסיון הסתיימה. השימוש באפליקציה מוגבל.",
        trialBlocked: "תקופת הניסיון הסתיימה. לא ניתן לבצע פעולה זו.",
        loginRequired: "יש להזין אימייל פעם אחת כדי להתחיל.",
        emailInvalid: "צריך להזין אימייל תקין.",
        loggingIn: "שומר אימייל...",
        loginFailed: "לא ניתן לשמור את האימייל כרגע.",
        loginReady: "האימייל נשמר."
      },
      en: {
        dir: "ltr",
        lang: "en",
        title: "Building Photo Setup",
        siteLabel: "Site",
        sitePlaceholder: "Site name",
        photographerLabel: "Photographer",
        photographerPlaceholder: "Photographer name",
        notesLabel: "Notes",
        notesPlaceholder: "Photo notes",
        dateTimeLabel: "Date and time",
        locationLabel: "Location",
        emailLabel: "Email",
        emailPlaceholder: "Email",
        loginBtn: "Confirm email",
        cameraAria: "Camera",
        previewEmpty: "The photo will appear here",
        captureBtn: "Capture",
        createBtn: "Create image",
        createdBtn: "Image created",
        saveBtn: "Save",
        savedBtn: "Saved",
        clearBtn: "Clear screen",
        rights: "All rights reserved",
        needPhoto: "Take a photo first.",
        saveStarted: "Save started",
        screenCleared: "Screen cleared",
        cameraUnsupported: "Camera is not supported in this browser.",
        openingCamera: "Opening camera...",
        cameraReady: "Camera is open. Tap Capture.",
        cameraDenied: "Could not open the camera. Allow camera permission in the browser.",
        cameraLoading: "The camera is still loading. Try again in a moment.",
        photoCaptured: "Photo captured. You can create an image with the details.",
        dateTimeLine: "Date and time",
        locationLine: "Location",
        locationUnsupported: "GPS is not supported in this browser.",
        locationLoading: "Finding street and city...",
        locationReady: "Location was added as an address.",
        locationDenied: "Location permission was not approved. Allow GPS in the browser.",
        addressUnavailable: "No full address was found for this location.",
        trialActive: "Trial version: {days} days left. Available until {date}.",
        trialLastDay: "Trial version: last day of use. Available until {date}.",
        trialExpired: "The trial period has ended. App use is limited.",
        trialBlocked: "The trial period has ended. This action is disabled.",
        loginRequired: "Enter your email once to start.",
        emailInvalid: "Enter a valid email address.",
        loggingIn: "Saving email...",
        loginFailed: "Could not save the email right now.",
        loginReady: "Email saved."
      }
    };

    function t(key) {
      return translations[currentLang][key] || translations.he[key] || key;
    }

    function setLanguage(lang) {
      currentLang = translations[lang] ? lang : "he";
      const text = translations[currentLang];
      document.documentElement.lang = text.lang;
      document.documentElement.dir = text.dir;
      document.title = text.title;

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = t(element.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
        element.placeholder = t(element.dataset.i18nPlaceholder);
      });
      document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
        element.setAttribute("aria-label", t(element.dataset.i18nAriaLabel));
      });
      document.querySelectorAll(".lang-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === currentLang);
      });

      if (!selectedImage && !cameraStream) {
        preview.textContent = t("previewEmpty");
      }
      if (createBtn.classList.contains("done")) {
        createBtn.textContent = t("createdBtn");
      }
      if (downloadLink.classList.contains("saved")) {
        downloadLink.textContent = t("savedBtn");
      }
      if (firebaseMode && !trialState) {
        trialNotice.textContent = t("loginRequired");
      }
      updateTrialNotice();
    }

    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    accessLoginBtn.addEventListener("click", async () => {
      await registerEmailForTrial();
    });

    cameraBtn.addEventListener("click", async () => {
      if (isTrialExpired()) {
        statusEl.textContent = t("trialBlocked");
        return;
      }
      await startCamera();
    });

    captureBtn.addEventListener("click", () => {
      capturePhoto();
    });

    locationCheck.addEventListener("change", async () => {
      if (isTrialExpired()) {
        locationCheck.checked = false;
        statusEl.textContent = t("trialBlocked");
        return;
      }
      if (locationCheck.checked) {
        const ok = await requestAddress();
        if (!ok) {
          locationCheck.checked = false;
        }
      } else {
        currentAddress = "";
      }
    });

    createBtn.addEventListener("click", () => {
      if (isTrialExpired()) {
        statusEl.textContent = t("trialBlocked");
        return;
      }
      if (!selectedImage) {
        statusEl.textContent = t("needPhoto");
        return;
      }

      if (locationCheck.checked && !currentAddress) {
        statusEl.textContent = t("locationLoading");
        requestAddress().then((ok) => {
          if (ok) {
            createBtn.click();
          }
        });
        return;
      }

      const canvas = document.createElement("canvas");
      const width = 1400;
      const height = 1800;
      const ctx = canvas.getContext("2d");
      canvas.width = width;
      canvas.height = height;

      drawCover(ctx, selectedImage, width, height);
      drawWatermark(ctx);
      drawInfoPanel(ctx, width, height);

      const dataUrl = canvas.toDataURL("image/png");
      preview.innerHTML = "";
      preview.classList.add("final-preview");
      preview.appendChild(canvas);
      downloadLink.href = dataUrl;
      downloadLink.download = createDownloadFileName();
      downloadLink.setAttribute("aria-disabled", "false");
      createBtn.classList.add("done");
      createBtn.textContent = t("createdBtn");
      statusEl.textContent = "";
      logUsage("createImageCount");
    });

    downloadLink.addEventListener("click", () => {
      if (isTrialExpired()) {
        statusEl.textContent = t("trialBlocked");
        return;
      }
      if (downloadLink.getAttribute("aria-disabled") === "true") {
        return;
      }

      downloadLink.classList.add("saved");
      downloadLink.textContent = t("savedBtn");
      clearBtn.hidden = false;
      statusEl.textContent = t("saveStarted");
      logUsage("saveCount");
    });

    clearBtn.addEventListener("click", () => {
      document.getElementById("site").value = "";
      document.getElementById("photographer").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("dateTimeCheck").checked = false;
      locationCheck.checked = false;
      currentAddress = "";
      stopCamera();
      selectedImage = null;

      preview.innerHTML = t("previewEmpty");
      preview.classList.remove("final-preview");
      captureBtn.hidden = true;
      createBtn.disabled = true;
      createBtn.classList.remove("done");
      createBtn.textContent = t("createBtn");
      downloadLink.href = "#";
      downloadLink.download = "building-photo-report.png";
      downloadLink.setAttribute("aria-disabled", "true");
      downloadLink.classList.remove("saved");
      downloadLink.textContent = t("saveBtn");
      clearBtn.hidden = true;
      statusEl.textContent = t("screenCleared");
    });

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusEl.textContent = t("cameraUnsupported");
        return;
      }

      try {
        stopCamera();
        statusEl.textContent = t("openingCamera");
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        liveVideo = document.createElement("video");
        liveVideo.autoplay = true;
        liveVideo.playsInline = true;
        liveVideo.muted = true;
        liveVideo.srcObject = cameraStream;

        preview.innerHTML = "";
        preview.classList.remove("final-preview");
        preview.appendChild(liveVideo);
        captureBtn.hidden = false;
        createBtn.disabled = true;
        statusEl.textContent = t("cameraReady");
      } catch (error) {
        statusEl.textContent = t("cameraDenied");
      }
    }

    function capturePhoto() {
      if (!liveVideo || !liveVideo.videoWidth) {
        statusEl.textContent = t("cameraLoading");
        return;
      }

      const photoCanvas = document.createElement("canvas");
      photoCanvas.width = liveVideo.videoWidth;
      photoCanvas.height = liveVideo.videoHeight;
      photoCanvas.getContext("2d").drawImage(liveVideo, 0, 0, photoCanvas.width, photoCanvas.height);

      const image = new Image();
      image.onload = () => {
        selectedImage = image;
        stopCamera();
        preview.innerHTML = "";
        preview.classList.remove("final-preview");
        preview.appendChild(image.cloneNode());
        captureBtn.hidden = true;
        createBtn.disabled = false;
        createBtn.classList.remove("done");
        createBtn.textContent = t("createBtn");
        downloadLink.href = "#";
        downloadLink.download = "building-photo-report.png";
        downloadLink.setAttribute("aria-disabled", "true");
        downloadLink.classList.remove("saved");
        downloadLink.textContent = t("saveBtn");
        clearBtn.hidden = true;
        statusEl.textContent = t("photoCaptured");
        logUsage("captureCount");
      };
      image.src = photoCanvas.toDataURL("image/jpeg", 0.92);
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach((track) => track.stop());
        cameraStream = null;
      }
      liveVideo = null;
    }

    function initializeTrial() {
      const firebaseConfig = window.BUILDING_PHOTO_FIREBASE || {};
      if (firebaseConfig.enabled) {
        initializeFirebaseTrial(firebaseConfig);
        return;
      }

      const key = "buildingPhotoTrialStart";
      let start = Number(localStorage.getItem(key));

      if (!start || Number.isNaN(start)) {
        start = Date.now();
        localStorage.setItem(key, String(start));
      }

      const expiresAt = start + 7 * 24 * 60 * 60 * 1000;
      trialState = { start, expiresAt };
      updateTrialNotice();
      applyTrialLock();
    }

    async function initializeFirebaseTrial(firebaseConfig) {
      firebaseMode = true;
      accessPanel.classList.add("visible");
      trialNotice.textContent = t("loginRequired");
      applyFirebaseLock(true);

      try {
        const [{ initializeApp }, { getAuth, onAuthStateChanged, signInAnonymously }, firestoreModule] = await Promise.all([
          import("https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js"),
          import("https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js")
        ]);

        const app = initializeApp(firebaseConfig.config);
        firebaseServices = {
          auth: getAuth(app),
          signInAnonymously,
          firestore: firestoreModule,
          db: firestoreModule.getFirestore(app),
          trialDays: firebaseConfig.trialDays || 7
        };

        onAuthStateChanged(firebaseServices.auth, async (user) => {
          const savedEmail = localStorage.getItem("buildingPhotoUserEmail") || "";
          if (user && savedEmail && firebaseTrialLoadedUser !== user.uid) {
            currentUserEmail = savedEmail;
            await loadOrCreateFirebaseTrial(user, savedEmail);
          } else {
            trialState = null;
            trialNotice.textContent = t("loginRequired");
            accessPanel.classList.add("visible");
            applyFirebaseLock(true);
          }
        });
      } catch (error) {
        accessNote.textContent = "Firebase configuration is not ready.";
      }
    }

    async function registerEmailForTrial() {
      const email = accessEmail.value.trim().toLowerCase();
      if (!isValidEmail(email)) {
        accessNote.textContent = t("emailInvalid");
        return;
      }

      if (!firebaseServices) {
        accessNote.textContent = "Firebase is not ready.";
        return;
      }

      try {
        accessNote.textContent = t("loggingIn");
        localStorage.setItem("buildingPhotoUserEmail", email);
        currentUserEmail = email;
        const credential = firebaseServices.auth.currentUser
          ? { user: firebaseServices.auth.currentUser }
          : await firebaseServices.signInAnonymously(firebaseServices.auth);
        await loadOrCreateFirebaseTrial(credential.user, email);
      } catch (error) {
        accessNote.textContent = t("loginFailed");
      }
    }

    async function loadOrCreateFirebaseTrial(user, email) {
      const {
        doc,
        getDoc,
        setDoc,
        updateDoc,
        increment,
        Timestamp,
        serverTimestamp
      } = firebaseServices.firestore;
      const trialRef = doc(firebaseServices.db, "buildingPhotoTrials", user.uid);
      firebaseTrialLoadedUser = user.uid;
      const snapshot = await getDoc(trialRef);
      let startsAt;
      let expiresAt;

      if (snapshot.exists()) {
        const data = snapshot.data();
        startsAt = data.startsAt.toMillis();
        expiresAt = data.expiresAt.toMillis();
        await updateDoc(trialRef, {
          email,
          lastSeenAt: serverTimestamp(),
          openCount: increment(1)
        });
      } else {
        startsAt = Date.now();
        expiresAt = startsAt + firebaseServices.trialDays * 24 * 60 * 60 * 1000;
        await setDoc(trialRef, {
          uid: user.uid,
          email,
          startsAt: Timestamp.fromMillis(startsAt),
          expiresAt: Timestamp.fromMillis(expiresAt),
          createdAt: serverTimestamp(),
          lastSeenAt: serverTimestamp(),
          openCount: 1,
          captureCount: 0,
          createImageCount: 0,
          saveCount: 0
        });
      }

      trialState = { start: startsAt, expiresAt };
      accessNote.textContent = t("loginReady");
      accessPanel.classList.remove("visible");
      updateTrialNotice();
      applyTrialLock();
      applyFirebaseLock(isTrialExpired());
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function logUsage(fieldName) {
      if (!firebaseMode || !firebaseServices || !firebaseServices.auth.currentUser || isTrialExpired()) {
        return;
      }

      try {
        const { doc, updateDoc, increment, serverTimestamp } = firebaseServices.firestore;
        const trialRef = doc(firebaseServices.db, "buildingPhotoTrials", firebaseServices.auth.currentUser.uid);
        await updateDoc(trialRef, {
          [fieldName]: increment(1),
          lastSeenAt: serverTimestamp()
        });
      } catch (error) {
        // Usage logging must never interrupt the photo workflow.
      }
    }

    function applyFirebaseLock(locked) {
      cameraBtn.disabled = locked;
      createBtn.disabled = locked || !selectedImage;
      downloadLink.setAttribute("aria-disabled", locked ? "true" : downloadLink.getAttribute("aria-disabled"));
      locationCheck.disabled = locked;
      dateTimeCheck.disabled = locked;
    }

    function getTrialDaysLeft() {
      if (!trialState) {
        return 0;
      }

      return Math.max(0, Math.ceil((trialState.expiresAt - Date.now()) / (24 * 60 * 60 * 1000)));
    }

    function isTrialExpired() {
      return trialState && Date.now() > trialState.expiresAt;
    }

    function updateTrialNotice() {
      if (!trialState) {
        return;
      }

      const locale = currentLang === "he" ? "he-IL" : "en-US";
      const expiryText = new Intl.DateTimeFormat(locale, { dateStyle: "short" }).format(new Date(trialState.expiresAt));
      const daysLeft = getTrialDaysLeft();

      trialNotice.classList.toggle("expired", isTrialExpired());
      if (firebaseMode && !isTrialExpired()) {
        trialNotice.textContent = "";
        return;
      }
      if (isTrialExpired()) {
        trialNotice.textContent = t("trialExpired");
      } else if (daysLeft <= 1) {
        trialNotice.textContent = t("trialLastDay").replace("{date}", expiryText);
      } else {
        trialNotice.textContent = t("trialActive").replace("{days}", String(daysLeft)).replace("{date}", expiryText);
      }
    }

    function applyTrialLock() {
      if (!isTrialExpired()) {
        return;
      }

      stopCamera();
      cameraBtn.disabled = true;
      captureBtn.hidden = true;
      createBtn.disabled = true;
      downloadLink.setAttribute("aria-disabled", "true");
      locationCheck.disabled = true;
      dateTimeCheck.disabled = true;
      statusEl.textContent = t("trialBlocked");
    }

    function requestAddress() {
      if (!navigator.geolocation) {
        statusEl.textContent = t("locationUnsupported");
        return Promise.resolve(false);
      }

      statusEl.textContent = t("locationLoading");

      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            try {
              currentAddress = await reverseGeocode(position.coords.latitude, position.coords.longitude);
              statusEl.textContent = t("locationReady");
              resolve(true);
            } catch (error) {
              currentAddress = t("addressUnavailable");
              statusEl.textContent = t("addressUnavailable");
              resolve(true);
            }
          },
          () => {
            currentAddress = "";
            statusEl.textContent = t("locationDenied");
            resolve(false);
          },
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 30000
          }
        );
      });
    }

    async function reverseGeocode(latitude, longitude) {
      const lang = currentLang === "he" ? "he" : "en";
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(latitude)}&lon=${encodeURIComponent(longitude)}&zoom=18&addressdetails=1&accept-language=${lang}`;
      const response = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!response.ok) {
        throw new Error("Reverse geocoding failed");
      }

      const data = await response.json();
      const address = data.address || {};
      const street = [address.road || address.pedestrian || address.footway || address.path, address.house_number].filter(Boolean).join(" ");
      const city = address.city || address.town || address.village || address.municipality || address.county;
      const parts = [street, city].filter(Boolean);

      return parts.length ? parts.join(", ") : (data.display_name || t("addressUnavailable"));
    }

    function drawInfoPanel(ctx, width, height) {
      const panelHeight = 290;
      const top = height - panelHeight;
      ctx.fillStyle = "rgba(17, 24, 39, .5)";
      ctx.fillRect(0, top, width, panelHeight);
      ctx.fillStyle = "#f97316";
      ctx.fillRect(0, top, width, 8);

      ctx.direction = "rtl";
      ctx.direction = translations[currentLang].dir;
      ctx.textAlign = currentLang === "he" ? "right" : "left";
      ctx.fillStyle = "#ffffff";
      ctx.font = "700 40px Segoe UI, Arial, sans-serif";
      const textX = currentLang === "he" ? width - 52 : 52;
      ctx.fillText(t("title"), textX, top + 58);

      const lines = buildLines();
      ctx.font = "500 26px Segoe UI, Arial, sans-serif";
      let y = top + 102;
      lines.forEach((line) => {
        wrapText(ctx, line, textX, y, width - 104, 34);
        y += line.length > 48 ? 58 : 36;
      });
    }

    function buildLines() {
      const lines = [];
      addLine(lines, t("siteLabel"), "site");
      addLine(lines, t("photographerLabel"), "photographer");
      if (document.getElementById("dateTimeCheck").checked) {
        const locale = currentLang === "he" ? "he-IL" : "en-US";
        lines.push(`${t("dateTimeLine")}: ${new Intl.DateTimeFormat(locale, { dateStyle: "short", timeStyle: "short" }).format(new Date())}`);
      }
      if (locationCheck.checked && currentAddress) {
        lines.push(`${t("locationLine")}: ${currentAddress}`);
      }
      addLine(lines, t("notesLabel"), "notes");
      lines.push(t("rights"));
      return lines;
    }

    function addLine(lines, label, id) {
      const value = document.getElementById(id).value.trim();
      if (value) {
        lines.push(`${label}: ${value}`);
      }
    }

    function createDownloadFileName() {
      const now = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      const stamp = [
        now.getFullYear(),
        pad(now.getMonth() + 1),
        pad(now.getDate())
      ].join("") + "-" + [
        pad(now.getHours()),
        pad(now.getMinutes()),
        pad(now.getSeconds())
      ].join("");

      return `building-photo-report-${stamp}.png`;
    }

    function drawWatermark(ctx) {
      if (!watermarkLogo.complete || !watermarkLogo.naturalWidth) {
        return;
      }

      const logoWidth = 220;
      const logoHeight = Math.round(logoWidth * watermarkLogo.naturalHeight / watermarkLogo.naturalWidth);
      const x = 54;
      const y = 54;

      ctx.save();
      ctx.globalAlpha = 0.82;
      ctx.drawImage(watermarkLogo, x, y, logoWidth, logoHeight);
      ctx.restore();
    }

    function drawCover(ctx, image, width, height) {
      const imageRatio = image.naturalWidth / image.naturalHeight;
      const targetRatio = width / height;
      let sourceWidth = image.naturalWidth;
      let sourceHeight = image.naturalHeight;
      let sourceX = 0;
      let sourceY = 0;

      if (imageRatio > targetRatio) {
        sourceWidth = image.naturalHeight * targetRatio;
        sourceX = (image.naturalWidth - sourceWidth) / 2;
      } else {
        sourceHeight = image.naturalWidth / targetRatio;
        sourceY = (image.naturalHeight - sourceHeight) / 2;
      }

      ctx.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      words.forEach((word) => {
        const testLine = line ? `${line} ${word}` : word;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          line = word;
          y += lineHeight;
        } else {
          line = testLine;
        }
      });
      ctx.fillText(line, x, y);
    }

    setLanguage("he");
    initializeTrial();
  </script>
</body>
</html>
